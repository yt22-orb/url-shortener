name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

env:
  DATABASE_URL: postgres://user:password@localhost:5432/urls
  # Fixes the deprecation warning in image_bec540.jpg
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: urls
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # Added 'v' for more detail on why it's failing
        run: pytest -v 

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build and Push
        # Using the official action is more reliable than manual docker commands
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest