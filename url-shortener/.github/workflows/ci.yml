name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

env:
  # 1. Use the correct SQLAlchemy protocol
  DATABASE_URL: postgresql://user:password@localhost:5432/urls
  # 2. Clear the Node.js 20 warning from image_be6f46.png
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: urls
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # Added 'v' for more detail on why it's failing
        run: pytest -v 

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      # 3. Build the image so it actually exists before tagging/pushing
      - name: Build Docker image
        run: docker build -t url-shortener:latest .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --with-token

      - name: Push image
        run: |
          docker tag url-shortener:latest ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest